<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Number Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #FF6B6B 0%, #4ECDC4 100%);
            --secondary-gradient: linear-gradient(135deg, #45B7D1 0%, #96CEB4 100%);
            --accent-gradient: linear-gradient(135deg, #FFEAA7 0%, #DDA0DD 100%);
            --success-gradient: linear-gradient(135deg, #6C5CE7 0%, #A8E6CF 100%);
            --warning-gradient: linear-gradient(135deg, #FD79A8 0%, #FDCB6E 100%);
            --info-gradient: linear-gradient(135deg, #74B9FF 0%, #A29BFE 100%);
            --danger-gradient: linear-gradient(135deg, #FF7675 0%, #FD79A8 100%);
            
            --bg-primary: #FAF3F0;
            --bg-secondary: #FFEEE7;
            --bg-tertiary: #FFE5D9;
            --text-primary: #2D3436;
            --text-secondary: #636E72;
            --text-tertiary: #B2BEC3;
            --border-color: #FAB1A0;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        [data-theme="dark"] {
            --bg-primary: #1A1A2E;
            --bg-secondary: #16213E;
            --bg-tertiary: #0F3460;
            --text-primary: #EAEAEA;
            --text-secondary: #B8B8B8;
            --text-tertiary: #888888;
            --border-color: #533483;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(45deg, #FF6B6B, #4ECDC4, #45B7D1, #96CEB4);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            min-height: 100vh;
            padding: 20px;
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: var(--bg-primary);
            border-radius: 25px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow: hidden;
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            animation: slideUp 0.8s ease-out;
            position: relative;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: var(--accent-gradient);
            animation: shimmer 3s infinite;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            border-radius: 50px;
            padding: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 20px;
        }

        .theme-toggle:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        header {
            background: linear-gradient(135deg, #FF6B6B 0%, #4ECDC4 50%, #45B7D1 100%);
            color: white;
            padding: 50px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(255,255,255,0.1), transparent, rgba(255,255,255,0.2), transparent);
            animation: rotate 10s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        h1 {
            font-size: 3.2rem;
            margin-bottom: 15px;
            font-weight: 800;
            background: linear-gradient(45deg, #ffffff, #FFEAA7, #ffffff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            position: relative;
            z-index: 1;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
        }

        .subtitle {
            opacity: 0.95;
            font-size: 1.2rem;
            font-weight: 400;
            position: relative;
            z-index: 1;
        }

        main {
            padding: 40px;
            background: var(--bg-primary);
        }

        .input-section {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }

        .input-section:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .input-group {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        label {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
            display: block;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input[type="text"] {
            flex: 1;
            min-width: 200px;
            padding: 16px 20px;
            border: 2px solid var(--border-color);
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
            transition: all 0.3s ease;
            background: var(--bg-primary);
            color: var(--text-primary);
        }

        input[type="text"]::placeholder {
            color: var(--text-tertiary);
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #FF6B6B;
            box-shadow: 0 0 0 4px rgba(255, 107, 107, 0.2);
            transform: translateY(-2px);
        }

        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
            font-family: inherit;
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: linear-gradient(45deg, rgba(255,255,255,0.4), rgba(255,255,255,0.1));
            transform: translate(-50%, -50%);
            transition: width 0.8s, height 0.8s;
        }

        button:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-primary {
            background: var(--accent-gradient);
            color: white;
            box-shadow: var(--shadow-md);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
        }

        .btn-secondary {
            background: var(--secondary-gradient);
            color: white;
            box-shadow: var(--shadow-md);
        }

        .btn-secondary:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
        }

        .btn-danger {
            background: var(--danger-gradient);
            color: white;
            box-shadow: var(--shadow-md);
        }

        .btn-danger:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
        }

        .btn-success {
            background: var(--success-gradient);
            color: white;
            box-shadow: var(--shadow-md);
        }

        .btn-success:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
        }

        .btn-warning {
            background: var(--warning-gradient);
            color: white;
            box-shadow: var(--shadow-md);
        }

        .btn-warning:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
        }

        .btn-info {
            background: var(--info-gradient);
            color: white;
            box-shadow: var(--shadow-md);
        }

        .btn-info:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
        }

        .numbers-section {
            background: var(--bg-primary);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s ease;
        }

        .numbers-section:hover {
            box-shadow: var(--shadow-md);
        }

        .section-header {
            background: var(--bg-secondary);
            padding: 20px 25px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-title {
            font-weight: 700;
            color: var(--text-primary);
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: '🎨';
            font-size: 1.8rem;
        }

        .stats {
            display: flex;
            gap: 25px;
            font-size: 0.9rem;
        }

        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px 15px;
            background: var(--bg-tertiary);
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .stat:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-sm);
        }

        .stat-value {
            font-weight: 700;
            font-size: 1.3rem;
            color: var(--text-primary);
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background: var(--bg-secondary);
            padding: 18px;
            text-align: left;
            font-weight: 700;
            color: var(--text-primary);
            border-bottom: 2px solid var(--border-color);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 16px 18px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
        }

        tr:hover {
            background: var(--bg-secondary);
            transform: scale(1.01);
            transition: all 0.2s ease;
        }

        .number-cell {
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--text-primary);
        }

        .even {
            background: linear-gradient(135deg, #6C5CE7, #A8E6CF);
            color: white;
            font-weight: 700;
            padding: 8px 16px;
            border-radius: 25px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
        }

        .odd {
            background: linear-gradient(135deg, #74B9FF, #A29BFE);
            color: white;
            font-weight: 700;
            padding: 8px 16px;
            border-radius: 25px;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            box-shadow: 0 4px 15px rgba(116, 185, 255, 0.3);
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .btn-sm {
            padding: 8px 14px;
            font-size: 0.75rem;
            border-radius: 8px;
        }

        .total-row {
            background: linear-gradient(135deg, #FF6B6B, #4ECDC4, #45B7D1);
            color: white;
            font-weight: 700;
            position: relative;
            overflow: hidden;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .total-row::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            to { left: 100%; }
        }

        .total-row td {
            padding: 20px 18px;
            border-bottom: none;
            position: relative;
            z-index: 1;
        }

        .empty-state {
            text-align: center;
            padding: 60px 40px;
            color: var(--text-secondary);
        }

        .empty-state-icon {
            font-size: 5rem;
            margin-bottom: 25px;
            opacity: 0.3;
            animation: bounce 3s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-20px); }
            60% { transform: translateY(-10px); }
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 18px 24px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            z-index: 1000;
            transform: translateX(400px);
            transition: all 0.3s ease;
            box-shadow: var(--shadow-lg);
            backdrop-filter: blur(10px);
        }

        .notification.show {
            transform: translateX(0);
        }

        .notification.success {
            background: var(--success-gradient);
        }

        .notification.error {
            background: var(--danger-gradient);
        }

        .notification.info {
            background: var(--info-gradient);
        }

        @media (max-width: 600px) {
            .container {
                margin: 10px;
                border-radius: 10px;
            }

            h1 {
                font-size: 2rem;
            }

            main {
                padding: 20px;
            }

            .input-group {
                flex-direction: column;
                align-items: stretch;
            }

            input[type="text"] {
                min-width: auto;
            }

            .stats {
                flex-direction: column;
                gap: 10px;
            }

            table {
                font-size: 0.8rem;
            }

            th, td {
                padding: 6px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌙</button>
            <h1>Advanced Number Manager</h1>
            <p class="subtitle">Insert, manage, and analyze your numbers with ease</p>
        </header>
        <main>
            <div class="input-section">
                <div class="input-group">
                    <div style="flex: 1;">
                        <label for="txtNum">Insert any Positive Numbers:</label>
                        <input type="text" id="txtNum" placeholder="Enter a positive number...">
                    </div>
                </div>
                <div class="button-group">
                    <button id="btn1" class="btn-primary">Insert</button>
                    <button id="btn2" class="btn-secondary">Clear Input</button>
                    <button id="btnSort" class="btn-warning">Sort</button>
                    <button id="btnStats" class="btn-info">Statistics</button>
                </div>
            </div>
            <div class="numbers-section">
                <div class="section-header">
                    <div class="section-title">Inserted Numbers</div>
                    <div class="stats">
                        <div class="stat">
                            <div class="stat-value" id="countStat">0</div>
                            <div class="stat-label">Count</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value" id="evenStat">0</div>
                            <div class="stat-label">Even</div>
                        </div>
                        <div class="stat">
                            <div class="stat-value" id="oddStat">0</div>
                            <div class="stat-label">Odd</div>
                        </div>
                    </div>
                </div>
                <table id="tblNumbers">
                </table>
            </div>
            <div class="button-group" style="margin-top: 20px;">
                <button id="btn3" class="btn-danger">Clear All Items</button>
                <button id="btn4" class="btn-success" style="display: none;">Show Total</button>
                <button id="btnExport" class="btn-info" style="display: none;">Export Data</button>
            </div>
        </main>
    </div>
    <div id="notification" class="notification"></div>
    <script src="main.js"></script>
</body>
</html>
